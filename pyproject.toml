[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # bugbear
    "SIM", # simplify
    "RUF", # ruff-specific
]
ignore = [
    "E501",    # line too long (handled by formatter)
    "RUF012",  # mutable class variables
]

[tool.ruff.lint.isort]
known-first-party = ["notify_ha_plus"]
