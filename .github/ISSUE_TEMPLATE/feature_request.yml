name: Feature Request
description: Suggest a new feature for Notify HA Plus
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      placeholder: Describe the feature you'd like to see.
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      placeholder: How would this feature help you?
